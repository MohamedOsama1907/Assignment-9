<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- open graph -->
    <meta property="og:title" content="Clarity - Digital Solutions Platform" />
    <meta property="og:image" content="" />
    <meta property="og:url" content="" />
    <meta property="og:type" content="website" />
    <!-- robots meta ===> i don't understand why ? -->
    <meta name="robots" content="index, follow" />
    <meta name="description" content="" />
    <meta name="author" content="Mohamed Osama" />
    <!-- favicon -->
    <link rel="icon" href="images/favicon.png" type="image/x-icon" />
    <!-- bootstrab file -->
    <link rel="stylesheet" href="./CSS/bootstrap.min.css" />
    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet" />

    <!-- font awesome link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
    <!-- css file -->
    <link rel="stylesheet" href="./CSS/style.css" />
    <title>ContactHub - Smart Contact Manager</title>
  </head>

  <body class="pb-5">
    <!-- =========nav bar ========= -->
    <nav
      class="navbar bg-white navbar-expand-sm border-1 border-bottom box-shadow-lg py-3 fixed-top">
      <div class="container">
        <div
          class="d-flex align-items-center justify-content-center column-gap-3">
          <div
            class="contactIcon rounded-4 d-flex align-items-center justify-content-center">
            <i class="fas fa-address-book text-white"></i>
          </div>
          <div class="ContantInfo">
            <h1 class="mb-0 lh-base">Contact<span>Hub</span></h1>
            <p class="text-muted mb-0 fw-medium">Smart Contact Manager</p>
          </div>
          <a class="navbar-brand" href="#"></a>
        </div>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center column-gap-3">
            <li class="nav-item">
              <button
                data-bs-toggle="modal"
                data-bs-target="#staticBackdrop"
                id="addContactBtn"
                type="button"
                class="addContact btn btn-primary px-4 py-2 rounded-4 fw-semibold border-0">
                + Add Contact
              </button>
            </li>
            <li class="nav-item navbarIcon">
              <span
                class="nav-link d-flex align-items-center justify-content-center rounded-3 text-secondary"
                ><i class="fa-solid fa-bell"></i
              ></span>
            </li>
            <li class="nav-item navbarIcon">
              <span
                class="nav-link d-flex align-items-center justify-content-center rounded-3 text-secondary"
                ><i class="fa-solid fa-gear"></i
              ></span>
            </li>
            <li class="nav-item">
              <img
                src="./Images/avatar-2.jpg"
                alt="avatar"
                class="avatarImage rounded-4 img-fluid" />
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="mt-4">
      <!-- ============= aboutContract ======== -->
      <section class="aboutContract">
        <div class="container">
          <div class="row g-4 contractDetails">
            <div class="col-6 col-md-4">
              <div
                class="box p-3 d-flex align-items-center column-gap-4 border border-2 bg-white rounded-4">
                <span
                  class="d-flex align-items-center justify-content-center rounded-3 text-white aboutContractIcon bg-primary total">
                  <i class="fa-solid fa-users"></i>
                </span>
                <div class="textDetails">
                  <p class="text-secondary text-uppercase fw-medium mb-0">
                    Total
                  </p>
                  <p class="fs-5 lh-base fw-bold fs-4 mb-0" id="totalCount">
                  </p>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-4">
              <div
                class="box p-3 d-flex align-items-center column-gap-4 border border-2 bg-white rounded-4">
                <span
                  class="d-flex align-items-center justify-content-center rounded-3 text-white aboutContractIcon bg-primary favorites">
                  <i class="fas fa-star"></i>
                </span>
                <div class="textDetails">
                  <p class="text-secondary text-uppercase fw-medium mb-0">
                    Favorites
                  </p>
                  <p class="fs-5 lh-base fw-bold fs-4 mb-0" id="favoriteCount">
                    0
                  </p>
                </div>
              </div>
            </div>
            <div class="col-6 col-md-4">
              <div
                class="box p-3 d-flex align-items-center column-gap-4 border border-2 bg-white rounded-4">
                <span
                  class="d-flex align-items-center justify-content-center rounded-3 text-white aboutContractIcon bg-primary emergency">
                  <i class="fa-solid fa-heart-pulse"></i>
                </span>
                <div class="textDetails">
                  <p class="text-secondary text-uppercase fw-medium mb-0">
                    Emergency
                  </p>
                  <p class="fs-5 lh-base fw-bold fs-4 mb-0" id="emergencyCount">0</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <!-- ======== All Contacts ===== -->
      <section class="allContracts">
        <div class="container">
          <div class="row g-5">
            <div class="col-12 col-xxl-9">
              <div class="topLeftSide mb-3">
                <h2 class="mb-1">All Contacts</h2>
                <p>Manage and organize your 0 contacts</p>
                <div
                  class="searchInput form-control rounded-4 border-1 border mb-3 py-2 position-relative">
                  <span class="search-icon">
                    <i class="fas fa-search"></i>
                  </span>

                  <input
                    type="search"
                    name="contractSearch"
                    oninput="search()"
                    id="contractSearch"
                    placeholder="Search by name, phone, or email"
                    class="border-0 ps-5 w-100 form-control" />
                </div>
              </div>
              <div class="row g-3" id="contactPlace"></div>
            </div>
            <div class="col-12 col-xxl-3">
              <div class="rightSide mb-4">
                <div class="favoritesCard border border-2 rounded-4">
                  <div
                    class="topPart d-flex align-items-center column-gap-3 rounded-top-4 p-3">
                    <span
                      class="d-flex align-items-center justify-content-center rounded-3 text-white">
                      <i class="fas fa-star"></i>
                    </span>
                    <div class="">
                      <h3 class="mb-0">Favorites</h3>
                      <p class="mb-0">Quick access to starred contacts</p>
                    </div>
                  </div>
                  <div class="bottomPart p-3">
                    <p class="text-muted text-center fs-6 fw py-3 mb-0">
                      No favorites yet
                    </p>
                  </div>
                </div>
              </div>
              <div class="rightSide">
                <div class="emergencyCard border border-2 rounded-4">
                  <div
                    class="topPart d-flex align-items-center column-gap-3 rounded-top-4 p-3">
                    <span
                      class="d-flex align-items-center justify-content-center rounded-3 text-white">
                      <i class="fa-solid fa-heart-pulse"></i>
                    </span>
                    <div class="">
                      <h3 class="mb-0">Emergency</h3>
                      <p class="mb-0">Important contacts for urgent calls</p>
                    </div>
                  </div>
                  <div class="bottomPart p-3">
                    <p class="text-muted text-center fs-6 fw py-3 mb-0">
                      No emergency contacts
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- contact modal -->

      <!-- Modal -->
      <div
        class="modal fade"
        id="staticBackdrop"
        data-bs-backdrop="static"
        data-bs-keyboard="false"
        tabindex="-1">
        <div class="modal-dialog modal-dialog-scrollable">
          <div class="modal-content p-2 rounded-4">
            <div class="modal-header">
              <h2
                class="modal-title fs-5 fw-bold text-start"
                id="staticBackdropLabel">
                Add New Contact
              </h2>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <div
                class="mx-auto text-white bg-primary d-flex align-items-center justify-content-center fs-2 rounded-circle userIcon">
                <i class="fa-solid fa-user"></i>
              </div>
              <!-- i make the photo upload section from scratch and make the style to the label and the input still work after hidden  -->
              <div
                class="photoUpload my-3 d-flex align-items-center justify-content-center">
                <input type="file" id="contactPhoto" class="d-none" />
                <label
                  for="contactPhoto"
                  class="btn btn-light border d-inline-flex text-muted align-items-center gap-2 rounded-3 fw-medium">
                  <i class="fa-solid fa-camera"></i>
                  <span>Change Photo</span>
                </label>
              </div>
              <form action="" class="contactForm d-flex flex-column">
                <label
                  class="mb-1 text-dark formLabel fw-medium"
                  for="contactName">
                  Full Name <span class="text-danger">*</span>
                </label>
                <input
                  type="text"
                  name="contactName"
                  id="contactName"
                  placeholder="Enter Full Name"
                  class="form-control rounded-3 border-1 mb-3" />
                <label
                  class="mb-1 text-dark formLabel fw-medium"
                  for="contactPhone">
                  Phone Number<span class="text-danger">*</span>
                </label>
                <input
                  type="tel"
                  name="contactPhone"
                  id="contactPhone"
                  placeholder="e.g., 01113203572"
                  class="form-control rounded-3 border-1 mb-3" />
                <label
                  class="mb-1 text-dark formLabel fw-medium"
                  for="contactEmail">
                  Email Address
                </label>
                <input
                  type="email"
                  name="contactEmail"
                  id="contactEmail"
                  placeholder="name@example.com"
                  class="form-control rounded-3 border-1 mb-3" />
                <label
                  class="mb-1 text-dark formLabel fw-medium"
                  for="contactAddress">
                  Address
                </label>
                <input
                  type="text"
                  name="contactAddress"
                  id="contactAddress"
                  placeholder="Enter Address"
                  class="form-control rounded-3 border-1 mb-3" />
                <label
                  class="mb-1 text-dark formLabel fw-medium"
                  for="contactGroup">
                  Group
                </label>
                <select
                  id="contactGroup"
                  class="form-select fw-medium mb-3"
                  aria-label="Select contact group">
                  <option value="" selected disabled>Select a group</option>
                  <option value="Family">Family</option>
                  <option value="Friends">Friends</option>
                  <option value="Work">Work</option>
                  <option value="School">School</option>
                  <option value="Other">Other</option>
                </select>
                <label
                  class="mb-1 text-dark formLabel fw-medium"
                  for="notesArea">
                  Notes
                </label>
                <textarea
                  name="notesArea"
                  id="notesArea"
                  rows="2"
                  placeholder="Add notes about this contact"
                  class="form-control rounded-3 border-1 mb-3"></textarea>
                <div class="d-flex align-items-center mb-3">
                  <div
                    class="form-check ps-0 d-flex align-items-center justify-content-center form-check-inline">
                    <input
                      class=""
                      type="checkbox"
                      id="favoriteCheckbox"
                      value="option1" />
                    <label class="form-check-label ms-2" for="favoriteCheckbox"
                      ><i class="fas fa-star text-warning"></i> Favorite</label
                    >
                  </div>
                  <div
                    class="form-check ps-0 d-flex align-items-center justify-content-center form-check-inline">
                    <input
                      class=""
                      type="checkbox"
                      id="emergencyCheckbox"
                      value="option2" />
                    <label
                      class="form-check-label ms-2"
                      for="emergencyCheckbox">
                      <i class="fa-solid fa-heart-pulse text-danger"></i>
                      Emergency</label
                    >
                  </div>
                </div>
              </form>
              <div
                class="modal-footer p-0 flex-column flex-md-row justify-content-start column-gap-2 border-0">
                <button
                  type="button"
                  class="btn btn-secondary rounded-3 border-0 fw-semibold m-0 py-2"
                  data-bs-dismiss="modal">
                  Cancel
                </button>
                <button
                  type="button"
                  id="addBtn"
                  onclick="addContact()"
                  class="btn text-white btn-primary rounded-3 border-0 fw-semibold m-0 py-2">
                  <i class="fa-solid fa-check me-2"></i>
                  Save Contact
                </button>
                <button
                  type="button"
                  id="updateBtn"
                  onclick="updateContact()"
                  class="btn text-white btn-primary rounded-3 border-0 fw-semibold m-0 py-2 d-none">
                  <i class="fa-solid fa-check me-2"></i>
                  Save Contact
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <!-- bootstrap file -->
    <script src="./JS/bootstrap.bundle.min.js"></script>
    <script src="./JS/main.js"></script>
  </body>
</html>
